name: Android CI/CD

on:
  push:
    branches: [ "main" ] # Se ejecutará cada vez que subas algo a la rama main

jobs:
  build:
    runs-on: ubuntu-latest
    # Permisos necesarios para que el script pueda crear la Release y subir el archivo
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Radio Semilla v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}